<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요 👋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1976d2, #dc004e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .avatar {
      width: 80px; height: 80px;
      background: #1976d2;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 24px;
    }
    h1 { font-size: 1.8rem; color: #1976d2; margin-bottom: 8px; }
    p  { color: #555; line-height: 1.7; margin-bottom: 12px; }
    .badge {
      display: inline-block;
      background: #f5f5f5;
      color: #1976d2;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
      margin: 4px;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      background: #1976d2;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn:hover { background: #1256a3; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🚀</div>
    <h1>안녕하세요!</h1>
    <p>AI Vibe Coding을 공부하고 있는<br><strong>juwan0221</strong>입니다.</p>
    <p>React · MUI · Vite로<br>멋진 웹을 만들어가고 있어요.</p>
    <div>
      <span class="badge">React</span>
      <span class="badge">MUI</span>
      <span class="badge">Vite</span>
      <span class="badge">GitHub Pages</span>
    </div>
    <a class="btn" href="https://github.com/juwan0221">GitHub 방문하기</a>
  </div>
</body>
</html>
